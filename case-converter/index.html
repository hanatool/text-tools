<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Case Converter Tool</title>

    <meta name="description" content="Modern Case Converter tool to convert text into uppercase, lowercase, capitalize, and more.">
    <meta name="keywords" content="case converter, uppercase, lowercase, text tool">
    <meta name="author" content="Case Converter">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body class="bg-light text-dark">

    <!-- Header -->
    <header class="border-bottom bg-white shadow-none sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light bg-white">
            <div class="container">
                <a class="navbar-brand fw-bold text-decoration-none text-dark" href="#">
                    <i class="fa-solid fa-font text-primary me-2"></i>
                    Case Converter
                </a>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-grow-1">

        <!-- Hero -->
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8 text-center">

                        <h2 class="fw-bold mb-3">
                            Convert Your Text Instantly
                        </h2>

                        <p class="text-secondary mb-4">
                            Simple and modern case converter tool to transform your text into uppercase, lowercase, capitalize case, and more.
                        </p>

                    </div>
                </div>
            </div>
        </section>

        <!-- Converter -->
        <section class="pb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body p-4">

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">
                                        Enter Text
                                    </label>

                                    <textarea 
                                        id="textInput" 
                                        class="form-control rounded-3" 
                                        rows="8" 
                                        placeholder="Type or paste your text here..."
                                    ></textarea>
                                </div>

                                <div class="d-grid gap-2 d-md-flex">

                                    <button class="btn btn-primary rounded-3" onclick="toUpperCaseText()">
                                        <i class="fa-solid fa-arrow-up-a-z me-1"></i>
                                        UPPERCASE
                                    </button>

                                    <button class="btn btn-secondary rounded-3" onclick="toLowerCaseText()">
                                        <i class="fa-solid fa-arrow-down-a-z me-1"></i>
                                        lowercase
                                    </button>

                                    <button class="btn btn-dark rounded-3" onclick="capitalizeText()">
                                        <i class="fa-solid fa-text-height me-1"></i>
                                        Capitalize
                                    </button>

                                    <button class="btn btn-outline-danger rounded-3" onclick="clearText()">
                                        <i class="fa-solid fa-trash me-1"></i>
                                        Clear
                                    </button>

                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <!-- Advertisement -->
        <section class="pb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        <div class="bg-white border rounded-4 shadow-sm p-5 text-center">
                            <p class="text-secondary mb-2 fw-semibold">
                                Advertisement Space
                            </p>

                            <div class="text-muted">
                                Your Ads Banner Here
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-top py-4 mt-auto">
        <div class="container text-center">

            <p class="mb-1 fw-semibold">
                Case Converter Tool
            </p>

            <small class="text-secondary">
                Modern responsive text converter built with Bootstrap 5.
            </small>

        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script -->
    <script>
        function toUpperCaseText() {
            const input = document.getElementById('textInput');
            input.value = input.value.toUpperCase();
        }

        function toLowerCaseText() {
            const input = document.getElementById('textInput');
            input.value = input.value.toLowerCase();
        }

        function capitalizeText() {
            const input = document.getElementById('textInput');

            input.value = input.value
                .toLowerCase()
                .replace(/\b\w/g, function(char) {
                    return char.toUpperCase();
                });
        }

        function clearText() {
            document.getElementById('textInput').value = '';
        }
    </script>

</body>
</html>
