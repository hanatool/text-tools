<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' name='viewport' />
    <meta name="description" content="Remove Duplicate Lines tool with responsive modern Bootstrap layout.">
    <meta name="keywords" content="remove duplicate lines, text cleaner, duplicate remover">
    <meta name="author" content="OpenAI">
    <meta name="robots" content="index, follow">

    <title>Remove Duplicate Lines</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://hanapha.com/banner/popunder.js"></script>
</head>
<body class="bg-light text-dark">

    <!-- Header -->
    <header class="border-bottom bg-white sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light bg-white">
            <div class="container">
                <a class="navbar-brand fw-bold text-decoration-none text-dark" href="#">
                    <i class="fa-solid fa-layer-group text-primary me-2"></i>
                    Remove Duplicate Lines
                </a>

                <a href="#" class="btn btn-outline-primary btn-sm">
                    <i class="fa-solid fa-house me-1"></i>
                    Home
                </a>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="py-5">
        <div class="container">

            <!-- Description -->
            <div class="text-center mb-5">
                <h2 class="fw-bold">Clean Duplicate Text Lines Instantly</h2>
                <p class="text-secondary mx-auto" style="max-width: 700px;">
                    Paste your text below and automatically remove duplicate lines quickly and efficiently.
                    Simple, fast, responsive, and easy to use on all devices.
                </p>
            </div>

            <!-- Tool -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">

                    <div class="row g-4">

                        <!-- Input -->
                        <div class="col-lg-6">
                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-file-lines me-1 text-primary"></i>
                                Input Text
                            </label>

                            <textarea id="inputText" class="form-control" rows="14" placeholder="Paste your lines here..."></textarea>
                        </div>

                        <!-- Output -->
                        <div class="col-lg-6">
                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-check-double me-1 text-success"></i>
                                Result
                            </label>

                            <textarea id="outputText" class="form-control" rows="14" placeholder="Clean result..." readonly></textarea>
                        </div>

                    </div>

                    <!-- Buttons -->
                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button class="btn btn-primary" onclick="removeDuplicates()">
                            <i class="fa-solid fa-broom me-1"></i>
                            Remove Duplicates
                        </button>

                        <button class="btn btn-outline-secondary" onclick="copyResult()">
                            <i class="fa-solid fa-copy me-1"></i>
                            Copy Result
                        </button>

                        <button class="btn btn-outline-danger" onclick="clearAll()">
                            <i class="fa-solid fa-trash me-1"></i>
                            Clear
                        </button>
                    </div>

                </div>
            </div>

            <!-- Ad Space -->
            <div class="card border-0 shadow-sm rounded-4 mt-5">
                <div class="card-body text-center py-5">
                    <script src="https://hanapha.com/banner/nativ.js"></script>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">
                Remove Duplicate Lines Tool
            </p>

            <small class="text-secondary">
                Responsive Bootstrap Utility Tool © <script type='text/javascript'>var creditsyear = new Date();document.write(creditsyear.getFullYear());</script>
            </small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script -->
    <script>
        function removeDuplicates() {
            const input = document.getElementById('inputText').value;

            const lines = input.split('\n');

            const uniqueLines = [...new Set(lines)];

            document.getElementById('outputText').value = uniqueLines.join('\n');
        }

        function copyResult() {
            const output = document.getElementById('outputText');

            output.select();
            output.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(output.value);

            alert('Result copied successfully.');
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
        }
    </script>

    <script src="https://hanapha.com/banner/socialbar.js"></script>
</body>
</html>
